<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100">
  <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Thêm truyện tranh</h1>

  <form [formGroup]="addForm" (ngSubmit)="submitForm()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tên truyện</label>
      <input 
        type="text" 
        formControlName="title" 
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 text-sm"
      />
      @if (title?.invalid && title?.touched) {
        @if (title?.errors?.['required']) {
          <p class="text-red-500 text-xs mt-1">Vui lòng nhập tên truyện</p>
        }
        @if (title?.errors?.['minlength']) {
          <p class="text-red-500 text-xs mt-1">Tên truyện phải ít nhất 3 ký tự</p>
        }
      }
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tác giả</label>
      <input 
        type="text" 
        formControlName="author" 
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Lượt xem</label>
      <input 
        type="number" 
        formControlName="views" 
        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 text-sm"
      />
    </div>

    <button 
      type="submit" [disabled]="addForm.invalid" 
      class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 text-white font-medium rounded-md shadow-sm transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
    >
      Thêm truyện
    </button>
  </form>
</div>
